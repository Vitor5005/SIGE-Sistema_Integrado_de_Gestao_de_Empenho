<body class="listagem">
    <div class="container-titulo">
        <h3><i class="bi bi-shop-window"></i> FORNECEDORES</h3>
        <hr>
    </div>
    <!-- Tabela da licitações cadastradas no sistema -->

    <table class="tabela">
        <thead>
            <tr>
                <th scope="col">Razão Social</th>
                <th scope="col">Nome Fantasia</th>
                <th scope="col">CNPJ</th>
                <th scope="col">Telefone</th>
                <th scope="col">Email</th>
            </tr>
        </thead>
        <tbody>
            @for (item of fornecedores; track item.id) {
            <tr (click)="enviarPara('/visualizar-fornecedor', item.id)" style="cursor: pointer;">
                <!-- Modificando o cursor temporariamente (Remover quando tiver classe apropriada) -->
                <td>{{ item.razao_social }}</td>
                <td>
                    {{ item.nome_fantasia }}
                </td>
                <td>{{ item.cnpj }}</td>
                <td>{{ item.telefone }}</td>
                <td>{{ item.email }}</td>
            </tr>
            }
        </tbody>
    </table>
</body>
