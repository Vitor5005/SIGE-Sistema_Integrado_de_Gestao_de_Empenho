<body>
  <form (submit)="save()">

    <div class="container-titulo">
      <h3>ADICIONAR LICITAÇÃO</h3>
      <hr>
    </div>


    <!-- informações gerais -->
    <section>
      <div class="subtitulo">
        <h5>1. INFORMAÇÕES GERAIS</h5>
        <hr>
      </div>
      <div class="conteudo">
        <div class="grupo-inputs">
          <div class="d-flex flex-column">
            <label>Número da Licitação</label>
            <input type="text" placeholder="Ex.: 001/2026" [(ngModel)]="licitacao.numero_licitacao"
              name="numero_licitacao">
          </div>

          <div class="d-flex flex-column">
            <label>Validade (em meses)</label>
            <input type="number" placeholder="12" [(ngModel)]="licitacao.validade" name="validade">
          </div>

          <div class="d-flex flex-column">
            <label>Data de abertura</label>
            <input type="date" [(ngModel)]="licitacao.data_abertura" name="data_abertura">
          </div>
        </div>

        <div>
          <label>Descrição (opcional)</label>
          <textarea rows="5" [(ngModel)]="licitacao.descricao" name="descricao"></textarea>
        </div>
      </div>
    </section>


    <div class="container-botoes">
      <button class="botao bnt-criar">Criar Licitação</button>
    </div>

  </form>

</body>
