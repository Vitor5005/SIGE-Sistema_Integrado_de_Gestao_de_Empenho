<body>
  <div class="container-login">
    <div class="login-cabecalho">
      <h1>Acessar conta</h1>
    </div>

    <form (ngSubmit)="realizarLogin()">

      <div class="d-flex flex-column gap-2">
        <label for="Usuario">Usuario</label>
        <input type="text" name="Usuario" id="Usuario" [(ngModel)]="username">
      </div>

      <div>

        <div class="d-flex flex-column gap-2 senha-container">
          <label for="senha">Senha</label>
          <div class="campo-senha">
            <input
            
              [type]="mostrarSenha ? 'text' : 'password'"
              name="senha"
              id="senha"
              [(ngModel)]="password"
            >
            <i
              class="bi"
              [ngClass]="mostrarSenha ? 'bi-eye-slash' : 'bi-eye'"
              (click)="toggleSenha()"
            ></i>
          </div>
        </div>

        <a [routerLink]="['/recuperar-senha']">
          <small>Esqueceu a senha?</small>
        </a>

      </div>

      <button type="submit" class="submit">Entrar</button>

    </form>

    <div>
      <p>Não tem uma conta? <a class="cadastre-se" routerLink="/cadastrar-se">Cadastre-se</a></p>
    </div>
  </div>
</body>
