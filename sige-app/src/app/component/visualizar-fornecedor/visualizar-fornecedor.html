<body class="fornecedor-container">
 <div class="container-btnVoltar">
    <button routerLink="/visualizar-licitacoes" class="btn-voltar">
      <i class="bi bi-arrow-left"></i> VOLTAR PARA LISTAGEM DE LICITAÇÕES
    </button>
  </div>

  <section class="card-fornecedor">
    <div class="card-header-main">
      <h1 class="fornecedor-nome">ACRE FRIOS</h1>
    </div>

    <div class="info-bloco">
      <div class="faixa-titulo">
        <h2 class="titulo-secao">INFORMAÇÕES GERAIS</h2>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <label>CNPJ</label>
          <span class="dado-valor">05.105.018/0001-71</span>
        </div>
        <div class="info-item">
          <label>TELEFONE</label>
          <span class="dado-valor">(68) 3229-2233</span>
        </div>
        <div class="info-item">
          <label>E-MAIL</label>
          <span class="dado-valor">acrefrios@hotmail.com</span>
        </div>
      </div>
    </div>

    <div class="info-bloco">
      <div class="faixa-titulo">
        <h2 class="titulo-secao">ENDEREÇO E LOCALIZAÇÃO</h2>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <label>RUA</label>
          <span class="dado-valor">Rua Marginal, 123</span>
        </div>
        <div class="info-item">
          <label>BAIRRO</label>
          <span class="dado-valor">Parque dos Sabias</span>
        </div>
        <div class="info-item">
          <label>MUNICÍPIO</label>
          <span class="dado-valor">Rio Branco</span>
        </div>
        <div class="info-item">
          <label>ESTADO</label>
          <span class="dado-valor">Acre</span>
        </div>
      </div>
    </div>

    <div class="footer-acoes">
      <button class="btn-editar" data-bs-toggle="modal" data-bs-target="#fornecedorModal">
        <i class="bi bi-pencil-square"></i> EDITAR INFORMAÇÕES
      </button>
    </div>
  </section>

  <div class="modal fade" id="fornecedorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content modal-custom">
        <div class="modal-header-azul">
          <h2 class="modal-titulo">EDIÇÃO DE FORNECEDOR</h2>
        </div>
        <div class="modal-body">
          <form class="form-fornecedor">
            <div class="form-row">
              <div class="form-group flex-2">
                <label>NOME FANTASIA</label>
                <input type="text" value="ACRE FRIOS">
              </div>
              <div class="form-group flex-1">
                <label>CNPJ</label>
                <input type="text" value="05.105.018/0001-71">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group flex-2">
                <label>RUA</label>
                <input type="text" value="Rua Marginal">
              </div>
              <div class="form-group flex-1">
                <label>NÚMERO</label>
                <input type="text" value="123">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>BAIRRO</label><input type="text" value="Parque dos Sabias"></div>
              <div class="form-group"><label>MUNICÍPIO</label><input type="text" value="Rio Branco"></div>
              <div class="form-group"><label>ESTADO</label><input type="text" value="Acre"></div>
            </div>
            <div class="form-row">
              <div class="form-group flex-1"><label>TELEFONE</label><input type="text" value="(68) 3229-2233"></div>
              <div class="form-group flex-2"><label>E-MAIL</label><input type="email" value="acrefrios@hotmail.com"></div>
            </div>
            <div class="form-footer">
              <button type="submit" class="btn-confirmar">
                <i class="bi bi-check-lg"></i> CONFIRMAR ALTERAÇÕES
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
